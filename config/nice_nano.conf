# ZMK Configuration for Nice Nano with OLED

# Enable OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# I2C Configuration (for OLED)
CONFIG_I2C=y
CONFIG_I2C_NRFX_TWIM0=y
CONFIG_I2C_NRFX_TWIM0_ENABLED=y

# Nice Nano Power Management
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_QUERYING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_QUEUE_DELAY=30000

# USB
CONFIG_ZMK_USB=y

# Memory
CONFIG_ZMK_KEYBOARD_NAME="ZMK Keyboard"
